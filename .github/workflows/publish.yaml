name: Secure NPM Publish

# ⚠️ SECURITY: This workflow uses Trusted Publishers (OIDC)
# No long-lived tokens needed - authentication via GitHub identity
# Requires NPM organization setup: https://docs.npmjs.com/trusted-publishers

on:
  # Manual trigger with version bump options
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
        default: 'patch'
      dry_run:
        description: 'Dry run (test without publishing)'
        required: false
        type: boolean
        default: false

  # Automatic publish on release tags
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write
  pull-requests: read

jobs:
  # ============================================
  # JOB 1: Security Audit & Validation
  # ============================================
  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Verify package integrity
        run: |
          echo "📦 Verifying package.json integrity..."
          node -e "JSON.parse(require('fs').readFileSync('package.json'))"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Run linter
        run: pnpm run lint

  # ============================================
  # JOB 2: Build & Test
  # ============================================
  build-and-test:
    name: 🏗️ Build & Test
    runs-on: ubuntu-latest
    needs: security-audit
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test
        continue-on-error: true

      - name: Build package
        run: pnpm run build

      - name: Validate build output
        run: |
          if [ ! -f "dist/index.js" ] && [ ! -f "dist/sdk.esm.js" ]; then
            echo "❌ Build failed: dist/ not found or empty"
            exit 1
          fi
          echo "✅ Build validation passed"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-build
          path: dist/
          retention-days: 7

  # ============================================
  # JOB 3: Version Bump (if manual trigger)
  # ============================================
  version-bump:
    name: 📝 Version Bump
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
    timeout-minutes: 5

    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Configure Git
        run: |
          git config user.name "quickswap-bot"
          git config user.email "bot@quickswap.exchange"

      - name: Bump version
        id: bump
        run: |
          echo "Current version: $(node -p "require('./package.json').version")"
          pnpm version ${{ inputs.bump }} --no-git-tag-version --no-commit-hooks
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "✅ Version bumped to: $NEW_VERSION"

      - name: Commit and push version
        run: |
          git add package.json pnpm-lock.yaml 2>/dev/null || true
          git add package.json
          git diff --staged --quiet || git commit -m "chore(release): v$(node -p "require('./package.json').version") [skip ci]"
          git tag "v$(node -p "require('./package.json').version")"
          git push origin HEAD --follow-tags

  # ============================================
  # JOB 4: Publish to NPM (Secure OIDC)
  # ============================================
  publish-npm:
    name: 🚀 Publish to NPM
    runs-on: ubuntu-latest
    needs: [build-and-test, version-bump]
    if: |
      always() &&
      needs.build-and-test.result == 'success' &&
      (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
        (github.event_name == 'workflow_dispatch' && !inputs.dry_run && needs.version-bump.result == 'success')
      )
    timeout-minutes: 10

    environment:
      name: npm-production
      url: https://www.npmjs.com/package/@quickswap-defi/sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch latest (after version bump)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git fetch origin --tags --force
          git reset --hard origin/${{ github.ref_name }}

      - name: Setup Node.js with NPM registry
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org/'

      - name: Update npm (required for OIDC)
        run: |
          npm install -g npm@latest
          npm --version

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sdk-build
          path: dist/

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild (ensure consistency)
        run: pnpm run build

      - name: Pre-publish verification
        run: |
          echo "📋 Package details:"
          npm pack --dry-run
          echo ""
          npm publish --dry-run

      - name: Check if version already exists
        id: check_version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "Checking if version $PACKAGE_VERSION already exists..."
          if npm view "@quickswap-defi/sdk@$PACKAGE_VERSION" version > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Publish to NPM
        if: steps.check_version.outputs.exists == 'false'
        run: npm publish --access public --provenance

      - name: Skip publish (version exists)
        if: steps.check_version.outputs.exists == 'true'
        run: |
          echo "⏭️ Skipping: version ${{ steps.check_version.outputs.version }} already exists"

      - name: Get published version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## 📦 NPM Package Published
            **Package:** `@quickswap-defi/sdk@${{ steps.version.outputs.version }}`
            **NPM:** https://www.npmjs.com/package/@quickswap-defi/sdk
            ### Installation
            ```bash
            npm install @quickswap-defi/sdk@${{ steps.version.outputs.version }}
            ```
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true

  # ============================================
  # JOB 5: Post-Publish Verification
  # ============================================
  verify-publish:
    name: ✅ Verify Publication
    runs-on: ubuntu-latest
    needs: publish-npm
    if: needs.publish-npm.result == 'success'
    timeout-minutes: 5

    steps:
      - name: Wait for NPM propagation
        run: sleep 30

      - name: Verify package
        run: |
          npm view @quickswap-defi/sdk version
          npm view @quickswap-defi/sdk --json | jq '.provenance'

      - name: Test installation
        run: |
          mkdir -p /tmp/test-install && cd /tmp/test-install
          npm init -y
          npm install @quickswap-defi/sdk --ignore-scripts
          echo "✅ Package installation successful"
